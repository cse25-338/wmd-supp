<!DOCTYPE html>
<html>
<head>
    <title>VYNTRA - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">VYNTRA</div>
        <ul class="menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="shop.html">SHOP</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="contact.html">CONTACT</a></li>
            <li><a href="login.html">LOGIN</a></li>
        </ul>
    </div>

    <div class="container">
        <h1 class="title">Customer Login</h1>

        <div class="login-box">
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="button" style="width: 100%; cursor: pointer;">Login</button>

                <p style="text-align: center; margin-top: 20px; color: #666;">
                    Don't have an account? <a href="#" style="color: #c41e3a;">Create one</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
